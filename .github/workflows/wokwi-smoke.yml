name: Wokwi Smoke Scenario

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  wokwi-smoke:
    runs-on: ubuntu-latest
    env:
      WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure token exists
        run: |
          if [ -z "$WOKWI_CLI_TOKEN" ]; then
            echo "WOKWI_CLI_TOKEN is not configured in repository secrets."
            exit 1
          fi

      - name: Install Wokwi CLI
        run: curl -L https://wokwi.com/ci/install.sh | sh

      - name: Add Wokwi CLI to PATH
        run: echo "$HOME/.wokwi/bin" >> $GITHUB_PATH

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install Arduino AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile smoke sketch
        run: |
          arduino-cli compile --fqbn arduino:avr:uno --output-dir backend/wokwi-smoke/build backend/wokwi-smoke

      - name: Wokwi lint
        run: |
          wokwi-cli lint backend/wokwi-smoke --diagram-file diagram.json

      - name: Run Wokwi smoke scenario
        run: |
          wokwi-cli backend/wokwi-smoke --scenario smoke.test.yaml --timeout 15000 --expect-text "SMOKE_OK" --expect-text "SMOKE_ALIVE"
